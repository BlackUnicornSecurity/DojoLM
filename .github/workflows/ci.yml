# Main CI Workflow
#
# This is the primary CI workflow that runs on every push and PR.
# It includes all quality checks: tests, linting, type checking, and documentation checks.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================
  # Build and Test
  # ============================================
  test:
    name: Test (${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run type-check

      - name: Run linter
        run: npm run lint

      - name: Run unit tests with coverage (bu-tpi)
        run: npm test -w packages/bu-tpi -- --coverage

      - name: Run unit tests with coverage (dojolm-web)
        run: npm test -w packages/dojolm-web -- --coverage

      - name: Run regression tests (scanner vs fixtures)
        run: cd packages/bu-tpi && npm run test:regression

      - name: Run unit tests with coverage (dojolm-mcp)
        run: npm test -w packages/dojolm-mcp -- --coverage

      - name: Run unit tests with coverage (dojolm-scanner)
        run: npm test -w packages/dojolm-scanner -- --coverage

      - name: Run scanner typecheck (@dojolm/scanner)
        run: npm run typecheck -w packages/dojolm-scanner

      - name: Install bmad validators dependencies
        run: npm ci --prefix packages/bmad-cybersec/validators

      - name: Run bmad validators tests
        run: npm test --prefix packages/bmad-cybersec/validators

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.node-version }}
          path: |
            packages/bu-tpi/coverage/
            packages/dojolm-web/coverage/
            packages/dojolm-mcp/coverage/
            packages/dojolm-scanner/coverage/
          retention-days: 14

  # ============================================
  # QA Framework Freshness
  # ============================================
  qa-framework-freshness:
    name: QA Framework Freshness
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Regenerate QA matrices
        run: |
          node team/testing/tools/generate-coverage-matrix.mjs
          node team/testing/tools/generate-uat-ux-matrix.mjs

      - name: Verify generated matrices are up to date
        run: |
          git diff --exit-code -- \
            team/testing/QA/QA-COVERAGE-MATRIX.generated.md \
            team/testing/QA/UAT-UX-COVERAGE-MATRIX.generated.md

  # ============================================
  # Security Scan
  # ============================================
  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        run: npm run security:scan

      - name: Validate fixture manifest (S06)
        run: cd packages/bu-tpi && npm run validate:manifest

  # ============================================
  # SAST
  # ============================================
  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: |
            p/javascript
            p/security-audit

  # ============================================
  # SBOM Generation (S08)
  # ============================================
  sbom:
    name: SBOM Generation
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate SBOM (CycloneDX)
        run: npm run sbom:generate

      - name: Upload SBOM artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.json
          retention-days: 90

  # ============================================
  # Documentation Quality
  # ============================================
  docs-quality:
    name: Documentation Quality
    runs-on: ubuntu-latest
    needs: [test, qa-framework-freshness]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Markdown linter
        run: npm run lint:md

      - name: Verify documentation metrics
        run: npm run verify:docs

  # ============================================
  # Link Check (allowed to fail on scheduled runs)
  # ============================================
  link-check:
    name: Link Check
    runs-on: ubuntu-latest
    needs: [test]
    continue-on-error: ${{ github.event_name == 'schedule' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check links with lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: |
            --verbose
            --no-progress
            --timeout 30
            --max-retries 3
            --exclude-path node_modules/
            --exclude-path .next/
            --exclude-path dist/
            --exclude 'https://twitter.com/*'
            --exclude 'https://x.com/*'
            '**/*.md'
          format: markdown
          output: lychee-report.md
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload link check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lychee-report
          path: lychee-report.md
          retention-days: 7

  # ============================================
  # E2E Smoke on Pull Requests
  # ============================================
  e2e-pr:
    name: E2E Smoke (PR)
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: cd packages/dojolm-web && npx playwright install chromium --with-deps

      - name: Run PR smoke E2E (desktop + mobile)
        run: cd packages/dojolm-web && npx playwright test --project=chromium --project=mobile-chrome --reporter=github

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-pr
          path: packages/dojolm-web/playwright-report/
          retention-days: 14

  # ============================================
  # Visual Regression Gate
  # ============================================
  visual-regression:
    name: Visual Regression
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: cd packages/dojolm-web && npx playwright install chromium --with-deps

      - name: Build app for E2E
        run: cd packages/dojolm-web && npm run build:e2e

      - name: Run visual regression tests
        run: cd packages/dojolm-web && npx playwright test visual-regression --project=chromium --reporter=github

      - name: Upload visual diff artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-diffs
          path: |
            packages/dojolm-web/test-results/
            packages/dojolm-web/playwright-report/
          retention-days: 14

  # ============================================
  # E2E Tests (Phase R4) — production target on main/master
  # ============================================
  e2e-prod:
    name: E2E Tests (Playwright, Prod Target)
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: cd packages/dojolm-web && npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: cd packages/dojolm-web && npx playwright test --reporter=github
        env:
          E2E_TARGET: prod
          E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
          NODA_API_KEY: ${{ secrets.NODA_API_KEY }}

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-prod
          path: packages/dojolm-web/playwright-report/
          retention-days: 14
