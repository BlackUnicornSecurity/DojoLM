# Documentation Link Checker
# 
# This workflow checks all documentation files for broken links.
# It runs on every PR that modifies documentation files and on a weekly schedule.
#
# Tool: lychee (https://github.com/lycheeverse/lychee) - Fast, Rust-based link checker

name: Documentation Link Check

on:
  push:
    branches: [main, master]
    paths:
      - '**.md'
      - 'docs/**'
      - '.github/workflows/docs-link-check.yml'
  pull_request:
    branches: [main, master]
    paths:
      - '**.md'
      - 'docs/**'
  schedule:
    # Run weekly on Sundays at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:
    # Allow manual triggering

jobs:
  link-check:
    name: Check Documentation Links
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check links with lychee
        uses: lycheeverse/lychee-action@v1
        with:
          # Check all markdown files
          args: |
            --verbose
            --no-progress
            --timeout 30
            --max-retries 3
            --retry-wait-time 5
            --accept 200,201,204,206,301,302,303,307,308
            --exclude-path node_modules/
            --exclude-path .next/
            --exclude-path dist/
            --exclude-path _bmad-output/
            --exclude 'https://twitter.com/*'
            --exclude 'https://x.com/*'
            --exclude 'https://linkedin.com/*'
            '**/*.md'
          
          # Output formats
          format: markdown
          output: lychee-report.md
          
          # Fail build on broken links
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload link check report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lychee-link-check-report
          path: lychee-report.md
          retention-days: 30

      - name: Comment on PR with link check results
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('lychee-report.md', 'utf8');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🔗 Documentation Link Check Failed\n\n${report}`
            });
