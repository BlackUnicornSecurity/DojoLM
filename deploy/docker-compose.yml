# DojoLM — Voyager Production Deployment
# Deploy to: /opt/dojolm/docker-compose.yml
# Target: Voyager (192.168.70.120)
# Caddy: dojo.bucc.internal -> localhost:3001 -> container:42001

services:
  dojolm-web:
    image: dojolm-web:latest
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: dojolm-web
    env_file:
      - .env
    restart: unless-stopped
    ports:
      - "0.0.0.0:3001:42001"
    environment:
      NODE_ENV: production
      PORT: "42001"
      HOSTNAME: "0.0.0.0"
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_URL: "https://dojo.bucc.internal"
      NEXT_PUBLIC_APP_URL: "https://dojo.bucc.internal"
      NEXT_PUBLIC_MAX_TEXT_LENGTH: "10000"
      NEXT_PUBLIC_ENABLE_ANALYTICS: "false"
      NEXT_PUBLIC_ENABLE_ERROR_REPORTING: "false"
      NODA_API_KEY: "${NODA_API_KEY}"
      NODA_API_KEY_ROLE: "${NODA_API_KEY_ROLE:-analyst}"
      TPI_DB_ENCRYPTION_KEY: "${TPI_DB_ENCRYPTION_KEY}"
      TPI_STORAGE_BACKEND: "${TPI_STORAGE_BACKEND:-db}"
      TPI_DATA_DIR: "${TPI_DATA_DIR:-/app/data}"
      TPI_TRUSTED_INTERNAL_IPS: "${TPI_TRUSTED_INTERNAL_IPS:-}"
      TPI_ADMIN_USERNAME: "${TPI_ADMIN_USERNAME:-admin}"
      TPI_ADMIN_PASSWORD: "${TPI_ADMIN_PASSWORD}"
      TPI_SESSION_TTL_HOURS: "${TPI_SESSION_TTL_HOURS:-24}"
      TPI_CORS_ORIGINS: "${TPI_CORS_ORIGINS:-https://dojo.bucc.internal}"
      GUARD_CONFIG_SECRET: "${GUARD_CONFIG_SECRET}"
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-http://localhost:11434}"
    volumes:
      - dojolm_data:/app/data
    deploy:
      resources:
        limits:
          memory: 1024M
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:42001/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  dojolm_data:
    driver: local
