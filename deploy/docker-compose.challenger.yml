# DojoLM — Challenger DEV/QA Deployment
# Deploy to: /opt/dojolm/docker-compose.yml on Challenger (192.168.70.130)
# No TLS on DEV/QA — app reachable at http://192.168.70.130:3001
# Caddy: optional, not required for DEV/QA

services:
  dojolm-web:
    image: dojolm-web:latest
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: dojolm-web
    env_file:
      - .env
    restart: unless-stopped
    ports:
      - "0.0.0.0:3001:42001"
    environment:
      NODE_ENV: production
      PORT: "42001"
      HOSTNAME: "0.0.0.0"
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_URL: "http://192.168.70.130:3001"
      NEXT_PUBLIC_APP_URL: "http://192.168.70.130:3001"
      NEXT_PUBLIC_MAX_TEXT_LENGTH: "10000"
      NEXT_PUBLIC_ENABLE_ANALYTICS: "false"
      NEXT_PUBLIC_ENABLE_ERROR_REPORTING: "false"
      # Demo mode — Challenger is DEV/QA only. Mock data enabled for pitch /
      # onboarding demos. Production failsafe in src/lib/demo/index.ts is
      # overridden here by TPI_ALLOW_DEMO_IN_PROD. Do NOT copy these two
      # variables to deploy/docker-compose.yml (Voyager / real PROD).
      NEXT_PUBLIC_DEMO_MODE: "${NEXT_PUBLIC_DEMO_MODE:-true}"
      TPI_ALLOW_DEMO_IN_PROD: "${TPI_ALLOW_DEMO_IN_PROD:-true}"
      NODA_API_KEY: "${NODA_API_KEY}"
      NODA_API_KEY_ROLE: "${NODA_API_KEY_ROLE:-analyst}"
      TPI_DB_ENCRYPTION_KEY: "${TPI_DB_ENCRYPTION_KEY}"
      TPI_STORAGE_BACKEND: "${TPI_STORAGE_BACKEND:-db}"
      TPI_DATA_DIR: "${TPI_DATA_DIR:-/app/data}"
      TPI_TRUSTED_INTERNAL_IPS: "${TPI_TRUSTED_INTERNAL_IPS:-}"
      TPI_ADMIN_USERNAME: "${TPI_ADMIN_USERNAME:-admin}"
      TPI_ADMIN_PASSWORD: "${TPI_ADMIN_PASSWORD}"
      TPI_SESSION_TTL_HOURS: "${TPI_SESSION_TTL_HOURS:-24}"
      TPI_CORS_ORIGINS: "${TPI_CORS_ORIGINS:-http://192.168.70.130:3001}"
      GUARD_CONFIG_SECRET: "${GUARD_CONFIG_SECRET}"
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-http://localhost:11434}"
    volumes:
      - dojolm_data:/app/data
    deploy:
      resources:
        limits:
          memory: 1024M
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:42001/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  dojolm_data:
    driver: local
